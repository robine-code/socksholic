    <title>Socksholic - Cart</title>
    <style>
        /* Global Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #FFFFFF;
            color: #333;
        }
        header {
            background-color: #2cabe2;
            color: white;
            padding: 1rem;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }
        nav {
            display: flex;
            justify-content: center;
            background-color: #2cabe2;
            padding: 0.5rem;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 1rem;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .cart {
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        .cart-item {
            display: flex;
            align-items: center;
            background-color: #FFFFFF;
            border: 1px solid #DDD;
            border-radius: 10px;
            margin-bottom: 1rem;
            padding: 1rem;
        }
        .cart-item img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 5px;
            margin-right: 1rem;
        }
        .total {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #28A745;
            margin-top: 2rem;
        }
        footer {
            text-align: center;
            padding: 1rem;
            background-color: #2cabe2;
            color: white;
        }
        /* Responsive */
        @media (max-width: 768px) {
            .cart-item {
                flex-direction: column;
                text-align: center;
            }
        }
